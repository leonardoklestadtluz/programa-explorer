<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- FONT STYLE -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- TITLE -->
    <title>SPA - Universe</title>

    <!-- STYLE -->
    <!-- <link rel="stylesheet" href="./css/style.css" /> -->
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <a id="logo" href="/">
        <img src="./assets/logo.svg" alt="Imagem do logo da página" />
      </a>

      <!-- MENU -->
      <nav>
        <a href="/" onclick="route()">Home</a>
        <a href="/theUniverse" onclick="route()">O Universo</a>
        <a href="/exploration" onclick="route()">Exploração</a>
        <a href="/404" onclick="route()">Erro</a>
      </nav>
    </header>

    <!-- CONTAINER -->
    <section class="container">
      <!-- MAIN -->
      <main>
        <!-- Conteúdo dinâmico -->
        <section id="app"></section>
      </main>
    </section>

    <script>
      const routes = {
        "/": "/pages/home.html",
        "/theUniverse": "/pages/theUniverse.html",
        "/exploration": "/pages/exploration.html",
        404: "/pages/404.html",
      };

      function route(event) {
        event = event || window.event;
        event.preventDefault();

        window.history.pushState({}, "", event.target.href);

        handle();
      }

      function handle() {
        const { pathname } = window.location;
        const route = routes[pathname] || routes[404];
        console.log("antes do fetch");
        fetch(route)
          .then((data) => data.text())
          .then((html) => console.log(html));

        console.log(route);
      }
    </script>
  </body>
</html>
